services:
  app:
    build: .
    environment:
      # How long a generated link stays alive, in seconds.
      LINK_TTL_SECONDS: ${LINK_TTL_SECONDS:-300}
      # Maximum accepted image size, in megabytes.
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}
      # Total storage budget for uploads, in megabytes. When full, uploads
      # are rejected until expired images free up space.
      MAX_STORAGE_MB: ${MAX_STORAGE_MB:-500}
      # How often the expired-image sweeper runs, in seconds.
      CLEANUP_INTERVAL_SECONDS: ${CLEANUP_INTERVAL_SECONDS:-30}
      # Public origin used when building links (needed behind a reverse proxy).
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
    volumes:
      - uploads:/data/uploads
    restart: unless-stopped

volumes:
  uploads:
